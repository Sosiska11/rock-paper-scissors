<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1, h2 {
            margin-bottom: 40px;
        }

        div {
            margin-bottom: 40px;
        }

        button{
            padding: 12px;
            background-color: rgb(109, 109, 255);
            border-radius: 20px;
            border-color: rgb(33, 51, 131);
            color: white;
            font-size: 25px;
            width: 160px;
            height: 80px;
        };
        h1{
         text-align: center;
        }
    </style>
</head>
<body>
        <h1>GAME ROCK PAPER SCISSORS!!!!!!</h1>
        <h2>First who reach 5 points will win</h2>
    <div>
        <button id="rock">✊ rock</button>
        <button id="paper">✋ paper</button>
        <button id="scissors">✌️ scissors</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
